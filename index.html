<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>御堂筋線 梅田方面 掲示板</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#0a0a0a;
      --panel2:#121212;
      --line:#242424;
      --text:#ffffff;
      --muted:#9ca3af;
      --cyan:#22d3ee;
      --green:#34d399;
      --amber:#fcd34d;
      --red:#f87171;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .phone{
      width:min(100%,460px);
      background:linear-gradient(180deg,#111,#050505);
      border:1px solid var(--line);
      border-radius:32px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
    }
    .head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#111,#060606);
    }
    .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .brand{
      font-size:11px;
      letter-spacing:.35em;
      color:var(--muted);
      text-transform:uppercase;
    }
    h1{
      margin:10px 0 0;
      font-size:30px;
      line-height:1.1;
      font-weight:900;
    }
    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .clock-label{
      font-size:12px;
      color:var(--muted);
      text-align:right;
    }
    .clock{
      margin-top:4px;
      font-weight:900;
      font-size:34px;
      font-variant-numeric:tabular-nums;
      text-align:right;
    }
    .content{padding:20px}
    .card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px;
    }
    .next-tag{
      font-size:12px;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:var(--cyan);
    }
    .next-main{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-end;
      margin-top:16px;
    }
    .time-big{
      font-size:68px;
      line-height:.95;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .dest-big{
      margin-top:10px;
      font-size:30px;
      font-weight:800;
    }
    .remain-box{text-align:right}
    .remain-label,.remain-unit{
      color:var(--muted);
      font-size:14px;
    }
    .remain-big{
      font-size:64px;
      line-height:.95;
      font-weight:900;
      font-variant-numeric:tabular-nums;
      margin-top:4px;
    }
    .status{
      margin-top:14px;
      font-size:20px;
      font-weight:800;
    }
    .green{color:var(--green)}
    .amber{color:var(--amber)}
    .red{color:var(--red)}
    .muted{color:var(--muted)}
    .list{
      margin-top:18px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
    }
    .thead,.item{
      display:grid;
      grid-template-columns:92px 1fr 82px;
      gap:10px;
      align-items:center;
    }
    .thead{
      padding:12px 16px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      background:#111;
    }
    .item{
      padding:15px 16px;
      border-top:1px solid #151515;
    }
    .item-time{
      font-size:30px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .item-dest{
      font-size:24px;
      font-weight:800;
    }
    .item-status{
      margin-top:4px;
      font-size:14px;
      font-weight:700;
    }
    .item-remain{
      text-align:right;
    }
    .item-remain-num{
      font-size:38px;
      line-height:1;
      font-weight:900;
      font-variant-numeric:tabular-nums;
    }
    .item-remain-unit{
      color:var(--muted);
      font-size:12px;
    }
    .foot{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      padding-bottom:4px;
    }
    @media (max-width: 420px){
      h1{font-size:26px}
      .clock{font-size:30px}
      .time-big{font-size:58px}
      .remain-big{font-size:54px}
      .dest-big{font-size:26px}
      .thead,.item{grid-template-columns:84px 1fr 74px}
      .item-time{font-size:26px}
      .item-dest{font-size:21px}
      .item-remain-num{font-size:32px}
    }
  </style>
</head>

          </div>
          <div>
            <div class="clock-label">現在時刻</div>

        </div>
      </div>

      <div class="content">
        <div class="card">
          <div class="next-tag">Next Train</div>
          <div class="next-main">
            <div>

              <div class="dest-big" id="next-dest">---</div>
            </div>
            <div class="remain-box">
              <div class="remain-label">あと</div>
              <div class="remain-big" id="next-remain">0</div>
              <div class="remain-unit">分</div>
            </div>
          </div>
          <div class="status" id="next-status">---</div>
        </div>

        <div class="list">
          <div class="thead">
            <div>発車</div>
            <div>行先</div>
            <div style="text-align:right;">あと</div>
          </div>
          <div id="list-body"></div>
        </div>

        <div class="foot">1分ごとに自動更新 / 心斎橋駅発・梅田方面の平日ダイヤ</div>
      </div>
    </div>
  </div>

      ["00:12","新大阪"]

    const WALK_OK = 15;
    const FAST_OK = 10;

    const pad = (n) => String(n).padStart(2, "0");
    const toMinutes = (hhmm) => {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    };

    function judge(diff){
      if (diff < 0) return { label: "発車済", className: "muted" };
      if (diff >= WALK_OK) return { label: "歩いて間に合う", className: "green" };
      if (diff >= FAST_OK) return { label: "早歩きなら間に合う", className: "amber" };
      return { label: "×", className: "red" };
    }

    function getServices(now){
      const current = now.getHours() * 60 + now.getMinutes();
      return timetable
        .map(([time, destination]) => {
          const diff = toMinutes(time) - current;
          return { time, destination, diff, status: judge(diff) };
        })
        .filter(item => item.diff >= -1)
        .slice(0, 4);
    }

    function render(){
      const now = new Date();
      document.getElementById("clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

      const services = getServices(now);
      const next = services[0];

      if (next){
        document.getElementById("next-time").textContent = next.time;
        document.getElementById("next-dest").textContent = next.destination;
        document.getElementById("next-remain").textContent = next.diff <= 0 ? "0" : String(next.diff);
        const status = document.getElementById("next-status");
        status.textContent = next.status.label;
        status.className = `status ${next.status.className}`;
      } else {
        document.getElementById("next-time").textContent = "--:--";
        document.getElementById("next-dest").textContent = "本日の表示終了";
        document.getElementById("next-remain").textContent = "0";
        const status = document.getElementById("next-status");
        status.textContent = "時刻データを追加すると続きも表示できます";
        status.className = "status muted";
      }

      const body = document.getElementById("list-body");
      body.innerHTML = services.map(item => `
        <div class="item">
          <div class="item-time">${item.time}</div>
          <div>
            <div class="item-dest">${item.destination}</div>
            <div class="item-status ${item.status.className}">${item.status.label}</div>
          </div>
          <div class="item-remain">
            <div class="item-remain-num">${item.diff <= 0 ? 0 : item.diff}</div>
            <div class="item-remain-unit">min</div>
          </div>
        </div>
      `).join("");
    }

    render();
    setInterval(render, 60 * 1000);
  </script>
</body>
</html>
